services:
  # 1. БАЗА ДАНИХ (PostgreSQL)
  database:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: monefy_invoice
      POSTGRES_USER: monefy_user
      POSTGRES_PASSWORD: root_password
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - app-network

  # 2. BACKEND (Laravel)
  backend:
    build:
      context: ./backend
      dockerfile: ../backend.Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    command: sh -c "composer install --no-interaction --no-progress && chmod -R 777 storage bootstrap/cache && php-fpm"
    environment:
      APP_NAME: Laravel
      APP_ENV: local
      APP_KEY: base64:6ploES24D9KW5xkpy8tZwYpRGZTZTixZ/xg16vjltf4=
      APP_DEBUG: "true"
      APP_URL: http://localhost
      DB_CONNECTION: pgsql
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: monefy_invoice
      DB_USERNAME: monefy_user
      DB_PASSWORD: root_password
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    networks:
      - app-network
    depends_on:
      - database

  # 3. ВЕБ-СЕРВЕР (Nginx)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network
    depends_on:
      - backend

  # 4. FRONTEND (Nuxt 4)
  frontend:
    image: node:20-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8000/api
    networks:
      - app-network
    depends_on:
      - nginx

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
